<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paiement annulé - Nama IA</title>
  <style>
    :root{color-scheme:dark;--bg:#0b0c0c;--fg:#f6f3ec;--muted:rgba(246,243,236,.66);--line:rgba(255,255,255,.12)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b0c0c;font-family:Inter,Arial,sans-serif;color:var(--fg);padding:22px}
    main{width:min(620px,100%);padding:34px;border:1px solid var(--line);border-radius:30px;background:rgba(255,255,255,.055)}
    h1{font:600 clamp(2.2rem,7vw,4rem) Georgia,serif;line-height:1.04;margin:0 0 18px;letter-spacing:-.03em}
    p{color:var(--muted);line-height:1.7}.btn{margin-top:20px;min-height:50px;border-radius:999px;padding:0 18px;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;font-weight:800;background:#fff;color:#050505}
  </style>
</head>
<body>
  <main>
    <h1>Paiement annulé.</h1>
    <p>Aucun paiement n’a été enregistré. Vous pouvez revenir aux offres et reprendre le paiement quand vous le souhaitez.</p>
    <a class="btn" href="/#pricing">Revenir aux tarifs</a>
  </main>
</body>
</html>
